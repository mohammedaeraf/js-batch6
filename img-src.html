<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Img Src</title>
    <script>
      function changeImage() {
        let myImg = document.getElementById("myImg");
        myImg.src = "https://picsum.photos/id/1013/400";
      }
    </script>
  </head>
  <body>
    <h2>Image Source Example</h2>
    <img
      id="myImg"
      src="https://picsum.photos/id/1011/400"
      alt="Any Random Image"
    />
    <br /><br />
    <button onclick="changeImage()">Change Image</button>
  </body>
</html>
